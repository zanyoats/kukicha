<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ app_title }}</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" sizes="any">
  <link rel="stylesheet" href="/static/player.css">
  <style>
    :root {
      color-scheme: {{ appearance_theme.color_scheme }};
      --bg: {{ appearance_theme.bg }};
      --surface: {{ appearance_theme.surface }};
      --surface-alt: {{ appearance_theme.surface_alt }};
      --surface-hover: {{ appearance_theme.surface_hover }};
      --surface-overlay: {{ appearance_theme.surface_overlay }};
      --surface-overlay-hover: {{ appearance_theme.surface_overlay_hover }};
      --text: {{ appearance_theme.text }};
      --muted: {{ appearance_theme.muted }};
      --line: {{ appearance_theme.line }};
      --track-row-highlight: {{ appearance_theme.track_row_highlight }};
      --track-row-highlight-text: {{ appearance_theme.track_row_highlight_text }};
      --accent: {{ accent_theme.accent }};
      --accent-strong: {{ accent_theme.accent_strong }};
      --accent-soft: {{ accent_theme.accent_soft }};
      --accent-foreground: {{ accent_theme.accent_foreground }};
    }
  </style>
</head>
<body data-page="{{ page_name }}">
  <main>
    <section id="view" data-page="{{ page_name }}">
      {% include view_template %}
    </section>

    <section id="controls" class="controls" aria-label="Player controls">
      <div id="now-playing" aria-live="polite"></div>
      <div class="buttons">
        <button class="primary" id="play" type="button">Play</button>
        <button id="previous" type="button">Previous</button>
        <button id="next" type="button">Next</button>
        <a id="queue-link" class="button-link" href="{{ queue_url }}" data-nav>Queue</a>
      </div>
      <audio id="audio" controls preload="metadata"></audio>
    </section>
  </main>
  <div class="toast-region">
    <div id="toast" class="toast" hidden aria-live="polite"
      data-toast-timeout-ms="{{ toast_timeout_ms }}"></div>
    <div id="job-toasts" class="job-toasts" aria-live="polite"></div>
  </div>
  <script type="application/json" id="queue-state">{{ queue_state|tojson }}</script>
  <script src="/static/player.js"></script>
</body>
</html>
