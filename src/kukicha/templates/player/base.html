<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ app_title }}</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" sizes="any">
  <link rel="stylesheet" href="/static/player.css">
  <style>
    :root {
      color-scheme: {{ appearance_theme.color_scheme }};
      --bg: {{ appearance_theme.bg }};
      --surface: {{ appearance_theme.surface }};
      --surface-alt: {{ appearance_theme.surface_alt }};
      --surface-hover: {{ appearance_theme.surface_hover }};
      --surface-overlay: {{ appearance_theme.surface_overlay }};
      --surface-overlay-hover: {{ appearance_theme.surface_overlay_hover }};
      --text: {{ appearance_theme.text }};
      --muted: {{ appearance_theme.muted }};
      --line: {{ appearance_theme.line }};
      --track-row-highlight: {{ appearance_theme.track_row_highlight }};
      --track-row-highlight-text: {{ appearance_theme.track_row_highlight_text }};
      --accent: {{ accent_theme.accent }};
      --accent-strong: {{ accent_theme.accent_strong }};
      --accent-soft: {{ accent_theme.accent_soft }};
      --accent-foreground: {{ accent_theme.accent_foreground }};
      --control-accent: {{ control_accent }};
    }
    {% if system_appearance_theme %}
    @media (prefers-color-scheme: dark) {
      :root {
        color-scheme: {{ system_appearance_theme.color_scheme }};
        --bg: {{ system_appearance_theme.bg }};
        --surface: {{ system_appearance_theme.surface }};
        --surface-alt: {{ system_appearance_theme.surface_alt }};
        --surface-hover: {{ system_appearance_theme.surface_hover }};
        --surface-overlay: {{ system_appearance_theme.surface_overlay }};
        --surface-overlay-hover: {{ system_appearance_theme.surface_overlay_hover }};
        --text: {{ system_appearance_theme.text }};
        --muted: {{ system_appearance_theme.muted }};
        --line: {{ system_appearance_theme.line }};
        --track-row-highlight: {{ system_appearance_theme.track_row_highlight }};
        --track-row-highlight-text: {{ system_appearance_theme.track_row_highlight_text }};
        --control-accent: {{ system_control_accent }};
      }
    }
    {% endif %}
  </style>
</head>
<body data-page="{{ page_name }}">
  <main>
    <section id="view" data-page="{{ page_name }}">
      {% include view_template %}
    </section>

    <section id="controls" class="controls" aria-label="Player controls">
      <div id="now-playing" aria-live="polite"></div>
      <div class="buttons">
        <a id="queue-link" class="button-link queue-link-button" href="{{ queue_url }}"
          aria-label="Queue" title="Queue" data-nav>
          <svg class="queue-link-icon" viewBox="0 0 16 16"
            xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
            <path fill="currentColor"
              d="M15 15H1v-1.5h14zm0-4.5H1V9h14zm-14-7A2.5 2.5 0 0 1 3.5 1h9a2.5 2.5 0 0 1 0 5h-9A2.5 2.5 0 0 1 1 3.5m2.5-1a1 1 0 0 0 0 2h9a1 1 0 1 0 0-2z" />
          </svg>
        </a>
      </div>
      <div class="transport" role="group" aria-label="Playback">
        <div class="transport-buttons" aria-label="Track navigation">
          <button id="previous" class="transport-step-button" type="button"
            aria-label="Previous" title="Previous">
            <svg class="transport-step-icon" viewBox="0 0 16 16"
              xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
              <path fill="currentColor"
                d="M3.3 1a.7.7 0 0 1 .7.7v5.15l9.95-5.744a.7.7 0 0 1 1.05.606v12.575a.7.7 0 0 1-1.05.607L4 9.149V14.3a.7.7 0 0 1-.7.7H1.7a.7.7 0 0 1-.7-.7V1.7a.7.7 0 0 1 .7-.7z" />
            </svg>
          </button>
          <button class="primary transport-play-toggle" id="play" type="button"
            aria-label="Play" aria-pressed="false" title="Play">
            <span class="play-toggle-icon" data-play-icon>
              <svg class="transport-play-icon" viewBox="0 0 16 16"
                xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
                <path fill="currentColor"
                  d="M3 1.713a.7.7 0 0 1 1.05-.607l10.89 6.288a.7.7 0 0 1 0 1.212L4.05 14.894A.7.7 0 0 1 3 14.288z" />
              </svg>
            </span>
            <span class="play-toggle-icon" data-pause-icon hidden>
              <svg class="transport-pause-icon" viewBox="0 0 16 16"
                xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
                <path fill="currentColor"
                  d="M2.7 1a.7.7 0 0 0-.7.7v12.6a.7.7 0 0 0 .7.7h2.6a.7.7 0 0 0 .7-.7V1.7a.7.7 0 0 0-.7-.7zm8 0a.7.7 0 0 0-.7.7v12.6a.7.7 0 0 0 .7.7h2.6a.7.7 0 0 0 .7-.7V1.7a.7.7 0 0 0-.7-.7z" />
              </svg>
            </span>
          </button>
          <button id="next" class="transport-step-button" type="button"
            aria-label="Next" title="Next">
            <svg class="transport-step-icon" viewBox="0 0 16 16"
              xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
              <path fill="currentColor"
                d="M12.7 1a.7.7 0 0 0-.7.7v5.15L2.05 1.107A.7.7 0 0 0 1 1.712v12.575a.7.7 0 0 0 1.05.607L12 9.149V14.3a.7.7 0 0 0 .7.7h1.6a.7.7 0 0 0 .7-.7V1.7a.7.7 0 0 0-.7-.7z" />
            </svg>
          </button>
        </div>
        <div class="track-progress">
          <span id="elapsed-time" class="time-label">0:00</span>
          <input id="playback-progress" class="progress-range" type="range" min="0" max="1000"
            value="0" step="1" aria-label="Track progress" disabled>
          <span id="duration-time" class="time-label">--:--</span>
        </div>
        <div class="volume-control">
          <button id="volume-toggle" class="volume-toggle" type="button" aria-label="Mute volume"
            aria-pressed="false" title="Mute volume">
            <svg id="volume-icon" class="volume-icon" xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 16 16" width="16" height="16" fill="currentColor"
              aria-hidden="true" focusable="false">
              <path
                d="M9.741.85a.75.75 0 0 1 .375.65v13a.75.75 0 0 1-1.125.65l-6.925-4a3.64 3.64 0 0 1-1.33-4.967 3.64 3.64 0 0 1 1.33-1.332l6.925-4a.75.75 0 0 1 .75 0zm-6.924 5.3a2.14 2.14 0 0 0 0 3.7l5.8 3.35V2.8zm8.683 4.29V5.56a2.75 2.75 0 0 1 0 4.88" />
              <path
                d="M11.5 13.614a5.752 5.752 0 0 0 0-11.228v1.55a4.252 4.252 0 0 1 0 8.127z" />
            </svg>
          </button>
          <input id="volume" class="volume-range" type="range" min="0" max="1" value="1"
            step="0.01" aria-label="Volume">
        </div>
      </div>
      <audio id="audio" preload="metadata"></audio>
    </section>
  </main>
  <div class="toast-region">
    <div id="toast" class="toast" hidden aria-live="polite"
      data-toast-timeout-ms="{{ toast_timeout_ms }}"></div>
    <div id="job-toasts" class="job-toasts" aria-live="polite"></div>
  </div>
  <div id="confirmation-dialog" class="confirmation-dialog" role="dialog"
    aria-modal="true" aria-labelledby="confirmation-title" aria-describedby="confirmation-message"
    hidden data-confirmation-dialog>
    <section class="confirmation-panel">
      <div class="confirmation-header">
        <h2 id="confirmation-title" data-confirmation-title>Confirm Action</h2>
      </div>
      <p id="confirmation-message" class="confirmation-message" data-confirmation-message></p>
      <div class="confirmation-actions">
        <button type="button" data-confirmation-cancel>Cancel</button>
        <button type="button" class="danger" data-confirmation-confirm>Confirm</button>
      </div>
    </section>
  </div>
  <div id="keyboard-shortcuts-dialog" class="keyboard-shortcuts-dialog" role="dialog"
    aria-modal="true" aria-labelledby="keyboard-shortcuts-title" hidden
    data-keyboard-shortcuts-dialog>
    <section class="keyboard-shortcuts-panel">
      <div class="keyboard-shortcuts-header">
        <h2 id="keyboard-shortcuts-title">Keyboard Shortcuts</h2>
      </div>
      <dl class="keyboard-shortcut-list">
        <div>
          <dt><kbd>K</kbd></dt>
          <dd>Play / pause</dd>
        </div>
        <div>
          <dt><kbd>J</kbd></dt>
          <dd>Previous queue track</dd>
        </div>
        <div>
          <dt><kbd>L</kbd></dt>
          <dd>Next queue track</dd>
        </div>
        <div>
          <dt><kbd>/</kbd></dt>
          <dd>Focus search</dd>
        </div>
        <div>
          <dt><kbd>1</kbd></dt>
          <dd>Home</dd>
        </div>
        <div>
          <dt><kbd>2</kbd></dt>
          <dd>Albums</dd>
        </div>
        <div>
          <dt><kbd>3</kbd></dt>
          <dd>Artists</dd>
        </div>
        <div>
          <dt><kbd>4</kbd></dt>
          <dd>Playlists</dd>
        </div>
        <div>
          <dt><kbd>5</kbd></dt>
          <dd>Queue</dd>
        </div>
        <div>
          <dt><kbd>Shift</kbd><span>+</span><kbd>R</kbd></dt>
          <dd>Rescan library</dd>
        </div>
        <div>
          <dt><kbd>?</kbd></dt>
          <dd>Show this sheet</dd>
        </div>
        <div>
          <dt><kbd>Esc</kbd></dt>
          <dd>Close / cancel</dd>
        </div>
      </dl>
      <div class="keyboard-shortcuts-actions">
        <button class="keyboard-shortcuts-close" type="button"
          data-close-keyboard-shortcuts>Close</button>
      </div>
    </section>
  </div>
  <script type="application/json" id="queue-state">{{ queue_state|tojson }}</script>
  <script src="/static/player.js"></script>
</body>
</html>
